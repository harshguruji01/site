<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password | HarshGuruJi</title>
  <meta name="description" content="Reset your password for HarshGuruJi.">
  <link rel="icon" type="image/png" href="logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="login.css">
</head>
<body>
  
  <div class="auth-wrapper">
    <div class="ambient-orb orb-1"></div>
    <div class="ambient-orb orb-2"></div>
    
    <main class="auth-container">
      <div class="auth-header">
        <a href="index.html" class="auth-logo">
          <img src="logo.png" alt="HarshGuruJi Logo">
          <span>HarshGuruJi</span>
        </a>
        <h1 class="auth-title">Forgot Password</h1>
        <p class="auth-subtitle">Enter your email address and we'll send you a link to reset your password.</p>
      </div>

      <form id="forgot-password-form" class="auth-form" action="verify-email.html" novalidate>
        <div class="auth-alert error" id="global-error" style="display:none;" aria-live="assertive"></div>
        <div class="auth-alert success" id="global-success" style="display:none;" aria-live="assertive"></div>
        
        <div class="input-group">
          <label for="email">Email address</label>
          <div class="input-wrapper">
            <input type="email" id="email" name="email" placeholder="student@example.com" required autocomplete="email">
            <div class="input-icon">✉</div>
          </div>
          <span class="error-text" id="email-error">Please enter a valid email address.</span>
        </div>

        <button type="submit" class="btn-submit" id="btn-reset">
          <span class="btn-text">Send Reset Link</span>
          <div class="btn-loader" style="display:none;"></div>
        </button>
      </form>

      <div class="auth-footer">
        <p>Remember your password? <a href="login.html">Log In</a></p>
      </div>
      
      <div class="terms-links">
        <a href="terms-and-conditions.html">Terms</a> &middot; <a href="privacy-policy.html">Privacy</a>
      </div>
    </main>
  </div>

  <script>
    document.getElementById('forgot-password-form').addEventListener('submit', function(e) {
      e.preventDefault();
      const emailInput = document.getElementById('email');
      const emailGroup = emailInput.closest('.input-group');
      const globalSuccess = document.getElementById('global-success');
      
      const email = emailInput.value;
      
      // Reset state
      emailGroup.classList.remove('invalid');
      globalSuccess.style.display = 'none';
      
      if (!email || !email.includes('@') || !email.includes('.')) {
        emailGroup.classList.add('invalid');
        // Trigger reflow for animation
        void emailGroup.offsetWidth;
        return;
      }
      
      // Simulate sending email
      const btnText = document.querySelector('.btn-text');
      const btnLoader = document.querySelector('.btn-loader');
      const submitBtn = document.getElementById('btn-reset');
      
      btnText.style.display = 'none';
      btnLoader.style.display = 'block';
      submitBtn.disabled = true;

      setTimeout(() => {
        btnLoader.style.display = 'none';
        globalSuccess.textContent = 'Reset link sent successfully!';
        globalSuccess.style.display = 'block';
        globalSuccess.style.color = 'var(--success-color)';
        globalSuccess.style.marginBottom = '1rem';
        globalSuccess.style.fontWeight = '600';
        globalSuccess.style.textAlign = 'center';
        
        setTimeout(() => {
          window.location.href = 'verify-email.html';
        }, 1200);
      }, 1500);
    });
  </script>
</body>
</html>
