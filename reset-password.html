<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password | HarshGuruJi</title>
  <meta name="description" content="Set a new password for your HarshGuruJi account.">
  <link rel="icon" type="image/png" href="logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="login.css">
</head>
<body>
  
  <div class="auth-wrapper">
    <div class="ambient-orb orb-1"></div>
    <div class="ambient-orb orb-2"></div>
    
    <main class="auth-container">
      <div class="auth-header">
        <a href="index.html" class="auth-logo">
          <img src="logo.png" alt="HarshGuruJi Logo">
          <span>HarshGuruJi</span>
        </a>
        <h1 class="auth-title">Reset Password</h1>
        <p class="auth-subtitle">Create a new, strong password for your account.</p>
      </div>

      <form id="reset-password-form" class="auth-form" action="login.html" novalidate>
        <div class="auth-alert error" id="global-error" style="display:none;" aria-live="assertive"></div>
        
        <div class="input-group">
          <label for="new-password">New Password</label>
          <div class="input-wrapper">
            <input type="password" id="new-password" name="new-password" placeholder="Enter new password" required autocomplete="new-password">
            <div class="input-icon lock">🔒</div>
            <button type="button" class="btn-toggle-password" id="toggle-new-pwd" aria-label="Show password">👁</button>
          </div>
          <span class="error-text" id="new-pwd-error">Password must be at least 8 characters.</span>
        </div>

        <div class="input-group">
          <label for="confirm-password">Confirm Password</label>
          <div class="input-wrapper">
            <input type="password" id="confirm-password" name="confirm-password" placeholder="Confirm new password" required autocomplete="new-password">
            <div class="input-icon lock">🔒</div>
            <button type="button" class="btn-toggle-password" id="toggle-confirm-pwd" aria-label="Show password">👁</button>
          </div>
          <span class="error-text" id="confirm-pwd-error">Passwords do not match.</span>
        </div>

        <button type="submit" class="btn-submit" id="btn-reset">
          <span class="btn-text">Reset Password</span>
          <div class="btn-loader" style="display:none;"></div>
        </button>
      </form>
    </main>
  </div>

  <script>
    function setupToggle(inputId, toggleId) {
      const input = document.getElementById(inputId);
      const toggleBtn = document.getElementById(toggleId);
      if(input && toggleBtn) {
        toggleBtn.addEventListener('click', () => {
          const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
          input.setAttribute('type', type);
          toggleBtn.textContent = type === 'password' ? '👁' : '👁‍🗨';
        });
      }
    }
    setupToggle('new-password', 'toggle-new-pwd');
    setupToggle('confirm-password', 'toggle-confirm-pwd');

    document.getElementById('reset-password-form').addEventListener('submit', function(e) {
      e.preventDefault();
      const newPwd = document.getElementById('new-password').value;
      const confirmPwd = document.getElementById('confirm-password').value;
      
      let valid = true;
      if (newPwd.length < 8) {
        document.getElementById('new-pwd-error').style.display = 'block';
        valid = false;
      } else {
        document.getElementById('new-pwd-error').style.display = 'none';
      }

      if (newPwd !== confirmPwd) {
        document.getElementById('confirm-pwd-error').style.display = 'block';
        valid = false;
      } else {
        document.getElementById('confirm-pwd-error').style.display = 'none';
      }

      if (valid) {
        const btnText = document.querySelector('.btn-text');
        const btnLoader = document.querySelector('.btn-loader');
        btnText.style.display = 'none';
        btnLoader.style.display = 'block';
        
        setTimeout(() => {
          window.location.href = 'login.html';
        }, 1500);
      }
    });
  </script>
</body>
</html>
