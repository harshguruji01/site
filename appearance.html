<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Appearance | HarshGuruJi</title>
  <link rel="icon" type="image/png" href="logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/dashboard-theme.css">
</head>
<body data-page-id="appearance">
  
  <div id="app">
    <main id="main-content" class="main-content">
      <div class="glass-card" style="max-width: 900px; margin: 0 auto;">
        <h1 style="font-family: 'Space Grotesk', sans-serif; margin-bottom: 0.5rem;">Appearance</h1>
        <p style="color: var(--text-secondary); margin-bottom: 2rem;">Customize how HarshGuruJi looks on your device.</p>
        
        <div style="margin-bottom: 2rem;">
          <h3>Theme Mode</h3>
          <p style="color: var(--text-secondary); font-size: 0.9rem; margin: 0.5rem 0 1rem;">Choose between light and dark mode.</p>
          <div style="display: flex; gap: 1rem;">
            <button class="btn btn-primary" onclick="document.body.setAttribute('data-theme', 'dark')">Dark Mode</button>
            <button class="btn btn-secondary" onclick="document.body.setAttribute('data-theme', 'light')">Light Mode</button>
          </div>
        </div>

      </div>
    </main>
  </div>
  <script type="module" src="js/dashboard.js"></script>
</body>
</html>
