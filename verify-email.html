<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verify Email | HarshGuruJi</title>
  <meta name="description" content="Verify your email address for HarshGuruJi.">
  <link rel="icon" type="image/png" href="logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="login.css">
  <style>
    .verify-icon {
      font-size: 3rem;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  
  <div class="auth-wrapper">
    <div class="ambient-orb orb-1"></div>
    <div class="ambient-orb orb-2"></div>
    
    <main class="auth-container" style="text-align: center;">
      <div class="auth-header">
        <a href="index.html" class="auth-logo" style="justify-content: center;">
          <img src="logo.png" alt="HarshGuruJi Logo">
          <span>HarshGuruJi</span>
        </a>
      </div>

      <div class="verify-icon">✉️</div>
      <h1 class="auth-title">Verify your email</h1>
      <p class="auth-subtitle" style="margin-bottom: 30px;">
        We have sent a verification link to your email address. Please check your inbox and click the link to verify your account or reset your password.
      </p>

      <a href="login.html" class="btn-submit" style="text-decoration: none; display: inline-block;">
        <span class="btn-text">Back to Login</span>
      </a>

      <div class="auth-footer" style="margin-top: 30px;">
        <p>Didn't receive the email? <a href="#" onclick="alert('Verification email resent!'); return false;">Resend Link</a></p>
      </div>
    </main>
  </div>

</body>
</html>
