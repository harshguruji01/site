<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>My Profile | HarshGuruJi</title><link rel="icon" type="image/png" href="logo.png"><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin=""><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Space+Grotesk:wght@500;700&amp;display=swap" rel="stylesheet"><link rel="stylesheet" href="css/dashboard-theme.css"><style>.profile-header{display:flex;align-items:center;gap:2rem;margin-bottom:2rem}.profile-avatar-container{position:relative;width:120px;height:120px}.profile-avatar{width:100%;height:100%;border-radius:50%;background:linear-gradient(135deg,var(--accent-secondary),var(--accent-tertiary));display:flex;justify-content:center;align-items:center;font-size:3rem;font-weight:700;background-size:cover;background-position:center;border:4px solid var(--bg-primary);box-shadow:0 4px 20px rgba(0,0,0,.5)}.edit-avatar-btn{position:absolute;bottom:0;right:0;background:var(--accent-primary);color:#fff;width:36px;height:36px;border-radius:50%;display:flex;justify-content:center;align-items:center;cursor:pointer;border:none;box-shadow:0 2px 10px rgba(0,0,0,.3);transition:all var(--transition-fast)}.edit-avatar-btn:hover{transform:scale(1.1)}.profile-form-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem}@media (max-width:768px){.profile-form-grid{grid-template-columns:1fr}.profile-header{flex-direction:column;text-align:center}}.full-width{grid-column:1/-1}.form-actions{display:flex;gap:1rem;justify-content:flex-end;margin-top:2rem;padding-top:1.5rem;border-top:1px solid var(--border-color)}.toast{position:fixed;bottom:20px;right:20px;padding:1rem 1.5rem;background:var(--success-color);color:#fff;border-radius:var(--border-radius-md);font-weight:600;box-shadow:0 10px 30px rgba(0,0,0,.3);z-index:1000;transform:translateY(100px);opacity:0;transition:all var(--transition-fast)}.toast.show{transform:translateY(0);opacity:1}</style><link rel="manifest" href="manifest.json"><meta name="theme-color" content="#ff3366"><link rel="apple-touch-icon" href="logo.png"><script type="application/ld+json">{
    "@context": "https://schema.org",
    "@type": "EducationalOrganization",
    "name": "HarshGuruJi",
    "url": "https://www.webguruji.online",

  }</script><meta http-equiv="X-XSS-Protection" content="1; mode=block"></head><body data-page-id="profile"><div id="app"><main id="main-content" class="main-content"><div class="glass-card" style="max-width:900px;margin:0 auto"><div class="profile-header"><div class="profile-avatar-container"><div class="profile-avatar" id="profile-avatar-display"></div><label for="avatar-upload" class="edit-avatar-btn" aria-label="Upload new avatar">📷</label> <input type="file" id="avatar-upload" accept="image/png, image/jpeg" style="display:none"></div><div><h1 style="font-family:'Space Grotesk',sans-serif">My Profile</h1><p style="color:var(--text-secondary)">Manage your personal information and preferences.</p></div></div><form id="profile-form"><div class="profile-form-grid"><div class="form-group"><label for="displayName">Full Name</label> <input type="text" id="displayName" name="displayName" class="form-control" placeholder="John Doe"></div><div class="form-group"><label for="username">Username</label> <input type="text" id="username" name="username" class="form-control" placeholder="johndoe"></div><div class="form-group"><label for="email">Email Address</label> <input type="email" id="email" name="email" class="form-control" readonly="" style="opacity:.7;cursor:not-allowed"> <small style="color:var(--warning-color);display:block;margin-top:.25rem">Email cannot be changed directly.</small></div><div class="form-group"><label for="phone">Phone Number</label> <input type="tel" id="phone" name="phone" class="form-control" placeholder="+1 234 567 8900"></div><div class="form-group full-width"><label for="bio">Bio</label> <textarea id="bio" name="bio" class="form-control" rows="4" placeholder="Tell us about yourself..."></textarea></div><div class="form-group"><label for="gender">Gender</label> <select id="gender" name="gender" class="form-control" style="background:rgba(0,0,0,.2)"><option value="">Prefer not to say</option><option value="male">Male</option><option value="female">Female</option><option value="other">Other</option></select></div><div class="form-group"><label for="dob">Date of Birth</label> <input type="date" id="dob" name="dob" class="form-control" style="color-scheme:dark"></div><div class="form-group"><label for="country">Country</label> <input type="text" id="country" name="country" class="form-control" placeholder="United States"></div><div class="form-group"><label for="city">City</label> <input type="text" id="city" name="city" class="form-control" placeholder="New York"></div><div class="form-group"><label for="language">Language</label> <select id="language" name="language" class="form-control" style="background:rgba(0,0,0,.2)"><option value="English">English</option><option value="Hindi">Hindi</option><option value="Spanish">Spanish</option><option value="French">French</option></select></div><div class="form-group"><label for="website">Website / Portfolio</label> <input type="url" id="website" name="website" class="form-control" placeholder="https://example.com"></div></div><div class="form-actions"><button type="button" class="btn btn-secondary" onclick="window.location.reload()">Cancel</button> <button type="submit" class="btn btn-primary" id="save-btn">Save Changes</button></div></form></div></main></div><div class="toast" id="toast">Profile updated successfully!</div><script type="module" src="js/dashboard.js" defer="true"></script><script type="module" src="js/profile.js" defer="true"></script></body></html>
