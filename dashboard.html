<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard | HarshGuruJi</title>
  <link rel="icon" type="image/png" href="logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/dashboard-theme.css">
  <style>
    /* Dashboard specific layout */
    .dashboard-grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 2rem;
    }
    @media (max-width: 1024px) {
      .dashboard-grid { grid-template-columns: 1fr; }
    }
    .welcome-card {
      background: linear-gradient(135deg, rgba(255,51,102,0.1), rgba(124,58,237,0.1));
      border: 1px solid rgba(255,51,102,0.2);
      padding: 2rem; border-radius: var(--border-radius-lg);
      margin-bottom: 2rem; display: flex; justify-content: space-between; align-items: center;
    }
    .welcome-text h1 { font-family: 'Space Grotesk', sans-serif; font-size: 2rem; margin-bottom: 0.5rem; }
    .welcome-text p { color: var(--text-secondary); }
    .profile-summary-card { text-align: center; }
    .profile-summary-avatar {
      width: 100px; height: 100px; border-radius: 50%;
      background: linear-gradient(135deg, var(--accent-secondary), var(--accent-tertiary));
      margin: 0 auto 1rem; display: flex; justify-content: center; align-items: center;
      font-size: 2.5rem; font-weight: bold; background-size: cover; background-position: center;
    }
    .badge {
      display: inline-block; padding: 0.25rem 0.75rem; border-radius: 50px;
      font-size: 0.8rem; font-weight: 600; background: rgba(34,197,94,0.1); color: var(--success-color);
      margin-top: 0.5rem;
    }
    .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-top: 1.5rem; }
    .stat-box { background: rgba(0,0,0,0.2); padding: 1rem; border-radius: var(--border-radius-md); }
    .stat-value { font-size: 1.5rem; font-weight: bold; font-family: 'Space Grotesk', sans-serif; }
    .stat-label { font-size: 0.8rem; color: var(--text-secondary); }
    
    .quick-actions { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; margin-top: 1.5rem; }
    .action-card {
      background: rgba(255,255,255,0.02); border: 1px solid var(--border-color);
      padding: 1rem; border-radius: var(--border-radius-md); text-decoration: none;
      color: var(--text-primary); display: flex; flex-direction: column; align-items: center;
      transition: all var(--transition-fast);
    }
    .action-card:hover { background: rgba(255,255,255,0.05); transform: translateY(-2px); border-color: var(--accent-tertiary); }
    .action-icon { font-size: 1.5rem; margin-bottom: 0.5rem; }
    
    /* Loading Skeleton */
    .skeleton { background: linear-gradient(90deg, rgba(255,255,255,0.05) 25%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0.05) 75%); background-size: 200% 100%; animation: loading 1.5s infinite; border-radius: 4px; }
    @keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
  </style>
</head>
<body data-page-id="dashboard">
  
  <div id="app">
    <!-- Sidebar and Header injected by dashboard.js -->
    <main id="main-content" class="main-content">
      
      <div class="welcome-card">
        <div class="welcome-text">
          <h1 id="welcome-name" class="skeleton" style="width: 250px; height: 35px;"></h1>
          <p>Welcome back to your learning dashboard. Here is what's happening.</p>
        </div>
        <div>
          <a href="profile.html" class="btn btn-primary">Edit Profile</a>
        </div>
      </div>

      <div class="dashboard-grid">
        <!-- Left Column -->
        <div class="left-col">
          <div class="glass-card mb-2">
            <h3>Recent Activity</h3>
            <p style="color: var(--text-secondary); margin-top: 0.5rem; font-size: 0.9rem;">Your recent learning and account activities will appear here.</p>
            <div style="margin-top: 1rem; padding: 1rem; background: rgba(0,0,0,0.2); border-radius: var(--border-radius-md);">
              <p>🟢 Logged in successfully</p>
            </div>
          </div>
          
          <div class="glass-card" style="margin-top: 2rem;">
            <h3>Quick Actions</h3>
            <div class="quick-actions">
              <a href="courses.html" class="action-card">
                <span class="action-icon">📚</span>
                <span>Continue Course</span>
              </a>
              <a href="achievements.html" class="action-card">
                <span class="action-icon">🏆</span>
                <span>View Badges</span>
              </a>
              <a href="security.html" class="action-card">
                <span class="action-icon">🔒</span>
                <span>Security</span>
              </a>
              <a href="bookmarks.html" class="action-card">
                <span class="action-icon">🔖</span>
                <span>Bookmarks</span>
              </a>
            </div>
          </div>
        </div>
        
        <!-- Right Column -->
        <div class="right-col">
          <div class="glass-card profile-summary-card">
            <div class="profile-summary-avatar" id="dash-avatar"></div>
            <h2 id="dash-username" class="skeleton" style="width: 150px; height: 25px; margin: 0 auto 0.5rem;"></h2>
            <p id="dash-email" class="skeleton" style="width: 200px; height: 15px; margin: 0 auto;"></p>
            <div class="badge" id="dash-role">Member</div>
            
            <div class="stats-grid">
              <div class="stat-box">
                <div class="stat-value" id="stat-points">0</div>
                <div class="stat-label">Points</div>
              </div>
              <div class="stat-box">
                <div class="stat-value" id="stat-coins">0</div>
                <div class="stat-label">Coins</div>
              </div>
              <div class="stat-box">
                <div class="stat-value" id="stat-logins">0</div>
                <div class="stat-label">Logins</div>
              </div>
            </div>
          </div>
        </div>
      </div>
      
    </main>
  </div>

  <script type="module" src="js/dashboard.js"></script>
  <script type="module">
    document.addEventListener('userDataLoaded', (e) => {
      const user = e.detail;
      
      // Remove skeleton classes and populate data
      const welcomeName = document.getElementById('welcome-name');
      welcomeName.classList.remove('skeleton');
      welcomeName.textContent = `Hello, ${user.displayName || user.username}!`;
      welcomeName.style.width = 'auto';

      const dashUsername = document.getElementById('dash-username');
      dashUsername.classList.remove('skeleton');
      dashUsername.textContent = user.username;
      dashUsername.style.width = 'auto';

      const dashEmail = document.getElementById('dash-email');
      dashEmail.classList.remove('skeleton');
      dashEmail.textContent = user.email;
      dashEmail.style.width = 'auto';

      const avatar = document.getElementById('dash-avatar');
      if (user.photoURL) {
        avatar.style.backgroundImage = `url(${user.photoURL})`;
        avatar.textContent = '';
      } else {
        avatar.textContent = (user.displayName || user.email).charAt(0).toUpperCase();
      }

      document.getElementById('dash-role').textContent = user.premium ? 'Premium Member' : (user.role === 'admin' ? 'Administrator' : 'Free Member');
      document.getElementById('stat-points').textContent = user.points || 0;
      document.getElementById('stat-coins').textContent = user.coins || 0;
      document.getElementById('stat-logins').textContent = user.loginCount || 1;
    });
  </script>
</body>
</html>
